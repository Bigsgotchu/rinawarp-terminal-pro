appId: com.rinawarptech.terminalpro
productName: RinaWarp Terminal Pro

npmRebuild: false

directories:
  output: dist-electron/installer
  buildResources: build

files:
  - dist-electron/**/*
  - "!dist-electron/installer{,/**/*}"
  - package.json
  - "!test-results{,/**/*}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"

asar: true

afterSign: build/afterSign.cjs

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  gatekeeperAssess: false
  icon: src/assets/icon.icns

win:
  target:
    - nsis
  icon: src/assets/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: src/assets/icon.png

artifactName: "RinaWarp-Terminal-Pro-${version}.${ext}"

publish:
  provider: generic
  url: https://rinawarptech.com/releases
