name = "rinawarp-downloads"
main = "download-worker.js"
compatibility_date = "2024-01-01"
account_id = "ba2f14cefa19dbdc42ff88d772410689"

[[r2_buckets]]
binding = "RINAWARP_CDN"
bucket_name = "rinawarp-cdn"

[[routes]]
pattern = "rinawarptech.com/download/mac"
zone_name = "rinawarptech.com"

[[routes]]
pattern = "rinawarptech.com/download/checksums"
zone_name = "rinawarptech.com"

[[routes]]
pattern = "rinawarptech.com/releases/latest.json"
zone_name = "rinawarptech.com"

[[routes]]
pattern = "rinawarptech.com/releases/v1.0.4/RinaWarp-Terminal-Pro-1.0.4.AppImage"
zone_name = "rinawarptech.com"

[[routes]]
pattern = "rinawarptech.com/releases/v1.0.4/RinaWarp-Terminal-Pro-1.0.4.deb"
zone_name = "rinawarptech.com"

[observability]
enabled = true

[observability.logs]
enabled = false
invocation_logs = true
