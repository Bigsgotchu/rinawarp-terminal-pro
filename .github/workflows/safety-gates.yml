name: Safety Gates

on:
  push:
  pull_request:

jobs:
  safety-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run safety tests
        run: pnpm run test:safety

      - name: Run failure-mode tests
        run: pnpm run test:failure
