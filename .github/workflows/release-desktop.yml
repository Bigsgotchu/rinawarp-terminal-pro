name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional existing version to package and publish, for example 1.1.14"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.channel.outputs.channel }}
      release_ref: ${{ steps.release_ref.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Detect release channel
        id: channel
        shell: bash
        run: echo "channel=$(bash scripts/release/detect-release-channel.sh)" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.release_version }}" ]]; then
            VERSION="${{ inputs.release_version }}"
            CURRENT_VERSION="$(node -p "require('./apps/terminal-pro/package.json').version")"
            if [[ "$CURRENT_VERSION" != "$VERSION" ]]; then
              echo "Requested release version $VERSION does not match apps/terminal-pro/package.json ($CURRENT_VERSION)" >&2
              exit 1
            fi
          else
            BUMP_TYPE="$(bash scripts/release/detect-version-bump.sh)"
            BASE_VERSION="$(bash scripts/release/apply-version-bump.sh "$BUMP_TYPE")"
            VERSION="$(bash scripts/release/apply-pre-release-version.sh "$BASE_VERSION" "${{ steps.channel.outputs.channel }}")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Generate changelog
        if: ${{ inputs.release_version == '' }}
        run: bash scripts/release/generate-changelog.sh "${{ steps.version.outputs.version }}"

      - name: Extract release notes
        shell: bash
        run: bash scripts/release/extract-latest-notes.sh > RELEASE_NOTES.md

- name: Commit release metadata
        if: ${{ inputs.release_version == '' && false }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/terminal-pro/package.json CHANGELOG.md
          git commit -m "release: v${{ steps.version.outputs.version }}"

      - name: Push release commit and tag
        if: ${{ inputs.release_version == '' && false }}
        shell: bash
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Capture release ref
        id: release_ref
        shell: bash
        run: echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate release
        run: bash scripts/release/validate-release.sh "${{ steps.version.outputs.version }}"

      - name: Verify signing configuration
        run: node scripts/verify-signing-config.mjs

      - name: Upload release notes
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: |
            RELEASE_NOTES.md
            CHANGELOG.md

  package-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Electron
        run: npm --workspace apps/terminal-pro run build:electron

      - name: Policy gate regression
        run: npm --prefix apps/terminal-pro run test:policy-gate

      - name: Package Linux
        run: |
          echo "Building Linux packages..."
          npx electron-builder --linux --publish never --config.compression=maximum

      - name: Packaged policy diagnostics proof
        run: bash apps/terminal-pro/scripts/run-electron-playwright.sh e2e/policy-diagnostics-proof.spec.ts

      - name: Upload Linux installers
        uses: actions/upload-artifact@v6
        with:
          name: desktop-linux-installers
          path: |
            apps/terminal-pro/dist-electron/installer/*.AppImage
            apps/terminal-pro/dist-electron/installer/*.deb
            apps/terminal-pro/dist-electron/installer/SHASUMS256.txt
            apps/terminal-pro/dist-electron/installer/latest.json
            apps/terminal-pro/dist-electron/installer/latest.yml
            apps/terminal-pro/dist-electron/installer/latest-linux.yml
            apps/terminal-pro/dist-electron/installer/stable/latest.json
            apps/terminal-pro/dist-electron/installer/stable/latest.yml
            apps/terminal-pro/dist-electron/installer/stable/latest-linux.yml

  package-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable corepack
        shell: bash
        run: corepack enable

      - name: Install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build Electron
        shell: bash
        run: npm --workspace apps/terminal-pro run build:electron

      - name: Package Windows (unsigned if no certs)
        run: |
          echo "Building Windows packages (will be unsigned without certificates)"
          CSC_LINK="" CSC_KEY_PASSWORD="" \
            npm --workspace apps/terminal-pro run package:win || \
            npx electron-builder --win --publish never --config.compression=maximum

      - name: Upload Windows installers
        uses: actions/upload-artifact@v6
        with:
          name: desktop-windows-installers
          path: |
            apps/terminal-pro/dist-electron/installer/*.exe
            apps/terminal-pro/dist-electron/installer/*.exe.blockmap

  package-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify signing config (warning only for beta)
        run: node scripts/verify-signing-config.mjs

      - name: Build Electron
        run: npm --workspace apps/terminal-pro run build:electron

      - name: Package macOS (unsigned if no certs)
        run: |
          echo "Building macOS packages (will be unsigned without certificates)"
          npx electron-builder --mac --publish never --config.compression=maximum

      - name: Upload macOS installers
        uses: actions/upload-artifact@v6
        with:
          name: desktop-mac-installers
          path: |
            apps/terminal-pro/dist-electron/installer/*.dmg
            apps/terminal-pro/dist-electron/installer/*.zip
            apps/terminal-pro/dist-electron/installer/SHASUMS256.txt

  publish:
    needs: [prepare, package-linux, package-windows, package-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download Linux installers
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-installers
          path: apps/terminal-pro/dist-electron/installer

      - name: Download Windows installers
        uses: actions/download-artifact@v8
        with:
          name: desktop-windows-installers
          path: apps/terminal-pro/dist-electron/installer

      - name: Download macOS installers
        uses: actions/download-artifact@v8
        with:
          name: desktop-mac-installers
          path: apps/terminal-pro/dist-electron/installer

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Smoke check artifacts
        run: bash scripts/smoke/release.sh

      - name: Publish Desktop
        run: npm run release:publish:desktop
        env:
          RINAWARP_ALLOW_DIRTY_RELEASE: 0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check updater contract
        run: npm run check:updater

      - name: Upload final desktop bundle
        uses: actions/upload-artifact@v6
        with:
          name: desktop-builds
          path: |
            apps/terminal-pro/**/dist/**
            RELEASE_NOTES.md
            CHANGELOG.md
