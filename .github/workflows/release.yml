name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace package dependencies
        run: |
          pnpm --filter @rinawarp/context build
          pnpm --filter @rinawarp/tools build
          pnpm --filter @rinawarp/safety build
          pnpm --filter @rinawarp/core build
          pnpm --filter @rinawarp/agent build
          pnpm --filter @rinawarp/doctor build

      - name: Build
        run: pnpm build

      - name: Package Linux
        run: pnpm --workspace apps/terminal-pro run build:electron && pnpm --workspace apps/terminal-pro run package:linux
        continue-on-error: true

      - name: Package Windows
        run: pnpm package:win
        continue-on-error: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            apps/terminal-pro/out/
            release/
          retention-days: 5

      - name: Create GitHub Release
        if: false && startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: RinaWarp ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        if: false && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./apps/terminal-pro/dist-electron/installer/RinaWarp-Terminal-Pro-1.0.4.AppImage
          asset_name: RinaWarp-Terminal-Pro-1.0.4.AppImage
          asset_content_type: application/octet-stream

      - name: Setup Wrangler
        if: startsWith(github.ref, 'refs/tags/v')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload to R2
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pnpm wrangler r2 object put releases/1.0.4/RinaWarp-Terminal-Pro-1.0.4.AppImage --source=apps/terminal-pro/dist-electron/installer/RinaWarp-Terminal-Pro-1.0.4.AppImage
          pnpm wrangler r2 object put releases/1.0.4/SHASUMS256.txt --source=release/v1.0.4/SHASUMS256.txt
          pnpm wrangler r2 object put releases/latest.json --source=release/v1.0.4/latest.json
          pnpm wrangler r2 object put releases/1.0.4/latest.json --source=release/v1.0.4/latest.json
