name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace package dependencies
        run: |
          pnpm --filter @rinawarp/context build
          pnpm --filter @rinawarp/tools build
          pnpm --filter @rinawarp/safety build
          pnpm --filter @rinawarp/core build
          pnpm --filter @rinawarp/agent build
          pnpm --filter @rinawarp/doctor build

      - name: Build
        run: pnpm build

      - name: Package Linux
        run: pnpm --workspace apps/terminal-pro run build:electron && pnpm --workspace apps/terminal-pro run package:linux
        continue-on-error: true

      - name: Package Windows
        run: pnpm package:win
        continue-on-error: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            apps/terminal-pro/out/
            release/
          retention-days: 5

      - name: Create GitHub Release
        if: false && startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: RinaWarp ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        if: false && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./apps/terminal-pro/dist-electron/installer/RinaWarp-Terminal-Pro-1.0.4.AppImage
          asset_name: RinaWarp-Terminal-Pro-1.0.4.AppImage
          asset_content_type: application/octet-stream

      - name: Prepare release files
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p release/v$VERSION

          APPIMAGE_SOURCE="$(find . -path './data/db' -prune -o -type f -name 'RinaWarp-Terminal-Pro-*.AppImage' -print | head -n 1)"
          if [ -z "$APPIMAGE_SOURCE" ]; then
            echo "ERROR: No AppImage artifact found after packaging"
            exit 1
          fi

          APPIMAGE_TARGET="release/v$VERSION/RinaWarp-Terminal-Pro-$VERSION.AppImage"
          cp "$APPIMAGE_SOURCE" "$APPIMAGE_TARGET"
          sha256sum "$APPIMAGE_TARGET" > "release/v$VERSION/SHASUMS256.txt"

          cat > "release/v$VERSION/latest.json" << EOF
          {
            "version": "$VERSION",
            "notes": "RinaWarp Terminal Pro v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "",
                "url": "releases/$VERSION/RinaWarp-Terminal-Pro-$VERSION.AppImage"
              }
            }
          }
          EOF

      - name: Upload to R2
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Debug output - make failures obvious
          echo "=== R2 Upload Debug Info ==="
          echo "Wrangler version: $(npx wrangler@3.90.0 --version)"
          echo "Bucket: rinawarp-cdn"
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Key prefix: releases/$VERSION/"
          echo "Tag: ${{ github.ref }}"
          echo "Version: $VERSION"
          echo ""
          
          # Verify secrets exist (fail fast)
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "ERROR: CLOUDFLARE_API_TOKEN is not set"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "ERROR: CLOUDFLARE_ACCOUNT_ID is not set"; exit 1; }
          echo "Secrets verified ✓"
          echo ""
          
          # List R2 buckets to verify access
          npx wrangler@3.90.0 r2 bucket list
          echo ""
          
          # Verify files exist before upload
          echo "=== Checking source files ==="
          ls -la release/v$VERSION/ 2>/dev/null || echo "release/v$VERSION/ not found"
          echo ""
          
          # Upload files
          echo "=== Uploading to R2 ==="
          npx wrangler@3.90.0 r2 object put rinawarp-cdn/releases/$VERSION/RinaWarp-Terminal-Pro-$VERSION.AppImage --file=release/v$VERSION/RinaWarp-Terminal-Pro-$VERSION.AppImage
          npx wrangler@3.90.0 r2 object put rinawarp-cdn/releases/$VERSION/SHASUMS256.txt --file=release/v$VERSION/SHASUMS256.txt
          npx wrangler@3.90.0 r2 object put rinawarp-cdn/releases/latest.json --file=release/v$VERSION/latest.json
          npx wrangler@3.90.0 r2 object put rinawarp-cdn/releases/$VERSION/latest.json --file=release/v$VERSION/latest.json
          echo ""
          echo "=== Upload complete ==="
