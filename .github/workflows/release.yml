name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            package_cmd: pnpm --dir apps/terminal-pro run dist:linux
          - platform: windows
            os: windows-latest
            package_cmd: pnpm --dir apps/terminal-pro run dist:win
          - platform: macos
            os: macos-latest
            package_cmd: pnpm --dir apps/terminal-pro run dist:mac

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK" || { echo "ERROR: CSC_LINK is not set"; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "ERROR: CSC_KEY_PASSWORD is not set"; exit 1; }
          test -n "$APPLE_ID" || { echo "ERROR: APPLE_ID is not set"; exit 1; }
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || { echo "ERROR: APPLE_APP_SPECIFIC_PASSWORD is not set"; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "ERROR: APPLE_TEAM_ID is not set"; exit 1; }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace package dependencies
        run: |
          pnpm --filter @rinawarp/context build
          pnpm --filter @rinawarp/tools build
          pnpm --filter @rinawarp/safety build
          pnpm --filter @rinawarp/core build
          pnpm --filter @rinawarp/agent build
          pnpm --filter @rinawarp/doctor build

      - name: Build
        run: pnpm build

      - name: Package ${{ matrix.platform }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: ${{ matrix.package_cmd }}

      - name: Locate built .app bundle
        if: matrix.platform == 'macos'
        working-directory: apps/terminal-pro
        shell: bash
        run: |
          APP_PATH="$(find . -name '*.app' -type d -print0 | xargs -0 ls -td | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under apps/terminal-pro"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Using app bundle: $APP_PATH"

      - name: Verify macOS codesign + gatekeeper
        if: matrix.platform == 'macos'
        working-directory: apps/terminal-pro
        shell: bash
        run: |
          test -n "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute -vv "$APP_PATH"

      - name: Upload installer outputs
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: apps/terminal-pro/dist-electron/installer/**
          if-no-files-found: error
          retention-days: 7

      - name: Upload .app bundle (debug artifact)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: terminal-pro-macos-app-${{ github.ref_name }}
          path: apps/terminal-pro/${{ env.APP_PATH }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-input
          merge-multiple: true

      - name: Prepare release files
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          RELEASE_DIR="release/v$VERSION"
          mkdir -p "$RELEASE_DIR"

          stage_if_found() {
            local pattern="$1"
            local target="$2"
            local source
            source="$(find release-input -type f -name "$pattern" | head -n 1)"
            if [ -n "$source" ]; then
              cp "$source" "$RELEASE_DIR/$target"
            fi
          }

          stage_if_found 'RinaWarp-Terminal-Pro-*.AppImage' "RinaWarp-Terminal-Pro-$VERSION.AppImage"
          stage_if_found 'RinaWarp-Terminal-Pro-*.deb' "RinaWarp-Terminal-Pro-$VERSION.deb"
          stage_if_found 'RinaWarp-Terminal-Pro-*.exe' "RinaWarp-Terminal-Pro-$VERSION.exe"
          stage_if_found 'RinaWarp-Terminal-Pro-*.dmg' "RinaWarp-Terminal-Pro-$VERSION.dmg"
          stage_if_found 'RinaWarp-Terminal-Pro-*.zip' "RinaWarp-Terminal-Pro-$VERSION.zip"

          APPIMAGE_TARGET="$RELEASE_DIR/RinaWarp-Terminal-Pro-$VERSION.AppImage"
          if [ ! -f "$APPIMAGE_TARGET" ]; then
            echo "ERROR: No AppImage artifact found after packaging"
            find release-input -maxdepth 3 -type f | sort
            exit 1
          fi

          ARTIFACTS=()
          while IFS= read -r -d '' file; do
            ARTIFACTS+=("$(basename "$file")")
          done < <(find "$RELEASE_DIR" -maxdepth 1 -type f ! -name 'latest.json' -print0 | sort -z)

          (
            cd "$RELEASE_DIR"
            sha256sum "${ARTIFACTS[@]}" > SHASUMS256.txt
          )

          VERSION="$VERSION" node <<'EOF'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          const version = process.env.VERSION;
          const releaseDir = path.join("release", `v${version}`);
          const releasePrefix = `releases/${version}`;
          const publishedAt = new Date().toISOString();

          function sha256(fileName) {
            const filePath = path.join(releaseDir, fileName);
            return crypto.createHash("sha256").update(fs.readFileSync(filePath)).digest("hex");
          }

          function entry(fileName) {
            if (!fileName) return null;
            const filePath = path.join(releaseDir, fileName);
            if (!fs.existsSync(filePath)) return null;
            return {
              name: fileName,
              path: `${releasePrefix}/${fileName}`,
              sha256: sha256(fileName),
              bytes: fs.statSync(filePath).size,
            };
          }

          const stagedFiles = fs.readdirSync(releaseDir);
          const appImage = stagedFiles.find((file) => file.endsWith(".AppImage")) || null;
          const deb = stagedFiles.find((file) => file.endsWith(".deb")) || null;
          const checksums = stagedFiles.find((file) => file === "SHASUMS256.txt") || null;
          const windowsExe = stagedFiles.find((file) => file.endsWith(".exe")) || null;
          const macDmg = stagedFiles.find((file) => file.endsWith(".dmg")) || null;
          const macZip = stagedFiles.find((file) => file.endsWith(".zip")) || null;

          const manifest = {
            schemaVersion: 1,
            product: "terminal-pro",
            version,
            notes: `RinaWarp Terminal Pro v${version}`,
            pub_date: publishedAt,
            files: {
              checksums: entry(checksums),
            },
            platforms: {},
          };

          if (appImage) {
            manifest.files.linux = entry(appImage);
            manifest.platforms["linux-x86_64"] = {
              signature: "",
              url: manifest.files.linux.path,
            };
          }

          if (deb) {
            manifest.files.deb = entry(deb);
          }

          if (windowsExe) {
            manifest.files.windows = entry(windowsExe);
          }

          if (macDmg || macZip) {
            manifest.files.mac = entry(macDmg || macZip);
          }

          if (macDmg && macZip) {
            manifest.files.macVariants = {
              dmg: entry(macDmg),
              zip: entry(macZip),
            };
          }

          fs.writeFileSync(
            path.join(releaseDir, "latest.json"),
            `${JSON.stringify(manifest, null, 2)}\n`,
            "utf8",
          );
          EOF

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          test -n "$CLOUDFLARE_API_TOKEN" || { echo "ERROR: CLOUDFLARE_API_TOKEN is not set"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "ERROR: CLOUDFLARE_ACCOUNT_ID is not set"; exit 1; }

          npx wrangler@3.90.0 r2 bucket list

          for file in release/v$VERSION/*; do
            base="$(basename "$file")"
            if [ "$base" = "latest.json" ]; then
              continue
            fi
            npx wrangler@3.90.0 r2 object put "rinawarp-cdn/releases/$VERSION/$base" --file="$file"
          done

          npx wrangler@3.90.0 r2 object put "rinawarp-cdn/releases/latest.json" --file="release/v$VERSION/latest.json"
          npx wrangler@3.90.0 r2 object put "rinawarp-cdn/releases/$VERSION/latest.json" --file="release/v$VERSION/latest.json"
