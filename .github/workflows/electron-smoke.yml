name: Electron Smoke (Ubuntu)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "apps/terminal-pro/**"
      - "deploy/**"
      - ".github/workflows/electron-smoke.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
  pull_request:
    paths:
      - "apps/terminal-pro/**"
      - "deploy/**"
      - ".github/workflows/electron-smoke.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check duplicate IPC channels
        run: pnpm --filter rinawarp-terminal-pro run check:ipc

      - name: Lint (ESLint)
        run: pnpm --filter rinawarp-terminal-pro exec eslint . --ext .ts,.tsx,.js,.cjs,.mjs --format json --output-file /tmp/eslint.json || true

      - name: Clean build outputs
        run: pnpm run clean

      - name: Build Electron app
        run: pnpm --filter rinawarp-terminal-pro run build:electron

      - name: Check repo hygiene
        run: ./scripts/check-repo-hygiene.sh

      - name: Enforce shared E2E launch helper
        run: ./scripts/check-e2e-launch.sh

      - name: Run Playwright smoke under Xvfb (CI sandbox disabled)
        env:
          CI: "1"
          RINAWARP_E2E: "1"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: pnpm --filter rinawarp-terminal-pro run test:e2e:packaged-first-run

      - name: Run Electron proof and trust suite
        env:
          CI: "1"
          RINAWARP_E2E: "1"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: pnpm --filter rinawarp-terminal-pro run test:e2e:core

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: electron-smoke-artifacts
          path: |
            artifacts/*.tgz
            artifacts/diagnostics.json
            artifacts/support-bundle-result.json
            artifacts/support-bundle.zip
            apps/terminal-pro/test-results
            apps/terminal-pro/playwright-report
          if-no-files-found: ignore
