name: Desktop Packaging

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "apps/terminal-pro/**"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop-packaging.yml"

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Check no JS twins in src
        run: ./scripts/check-no-src-js.sh
      - name: Check for duplicate IPC channels
        run: node scripts/check-duplicate-ipc.js
      - name: Lint (ESLint)
        run: npm --workspace apps/terminal-pro run lint -- --format json --output-file /tmp/eslint.json || true
      - name: Enforce warning budget
        run: node scripts/eslint-warning-budget.js --max 0 /tmp/eslint.json
      - name: Clean
        run: npm run clean
      - name: Build Electron
        run: npm --workspace apps/terminal-pro run build:electron
      - name: Package Linux
        run: LINUX_PACKAGE_TIMEOUT=1200 npm --workspace apps/terminal-pro run package:linux

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Check no JS twins in src
        shell: bash
        run: ./scripts/check-no-src-js.sh
      - name: Check for duplicate IPC channels
        run: node scripts/check-duplicate-ipc.js
      - name: Lint (ESLint)
        run: npm --workspace apps/terminal-pro run lint -- --format json --output-file C:\Temp\eslint.json || true
      - name: Enforce warning budget
        run: node scripts/eslint-warning-budget.js --max 0 C:\Temp\eslint.json
      - name: Clean
        run: npm run clean
      - name: Build Electron
        run: npm --workspace apps/terminal-pro run build:electron
      - name: Package Windows
        run: npm --workspace apps/terminal-pro run package:win
