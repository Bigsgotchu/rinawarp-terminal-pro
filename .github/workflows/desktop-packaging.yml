name: Desktop Packaging

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "apps/terminal-pro/**"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/desktop-packaging.yml"

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Check for duplicate IPC channels
        run: pnpm --filter rinawarp-terminal-pro run check:ipc
      - name: Lint (ESLint)
        run: pnpm --filter rinawarp-terminal-pro exec eslint . --ext .ts,.tsx,.js,.cjs,.mjs --format json --output-file /tmp/eslint.json || true
      - name: Clean
        run: pnpm run clean
      - name: Build Electron
        run: pnpm --filter rinawarp-terminal-pro run build:electron
      - name: Package Linux
        run: LINUX_PACKAGE_TIMEOUT=1200 pnpm --filter rinawarp-terminal-pro run package:linux

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Check for duplicate IPC channels
        run: pnpm --filter rinawarp-terminal-pro run check:ipc
      - name: Lint (ESLint)
        run: pnpm --filter rinawarp-terminal-pro exec eslint . --ext .ts,.tsx,.js,.cjs,.mjs --format json --output-file C:\Temp\eslint.json || true
      - name: Clean
        run: pnpm run clean
      - name: Build Electron
        run: pnpm --filter rinawarp-terminal-pro run build:electron
      - name: Package Windows
        run: pnpm --filter rinawarp-terminal-pro run package:win
