name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Electron
        run: npm --workspace apps/terminal-pro run build:electron

      - name: Unit tests (Fix Flow)
        run: npm --workspace apps/terminal-pro run test:fix-project-flow

      - name: E2E Harness
        env:
          CI: "1"
          RINAWARP_E2E: "1"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: npm --workspace apps/terminal-pro run test:e2e:harness

      - name: E2E Fix Project
        env:
          CI: "1"
          RINAWARP_E2E: "1"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: npm --workspace apps/terminal-pro run test:e2e:fix-project

  telemetry-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Telemetry E2E
        env:
          CI: "1"
          RINAWARP_E2E: "1"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: npm --workspace apps/terminal-pro run test:e2e:telemetry
