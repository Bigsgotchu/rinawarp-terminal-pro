apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rinawarp-to-nats
  namespace: rinawarp-system
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rinawarp-runtime-controller
      ports:
        - protocol: TCP
          port: 4222
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-runtime-controller-egress
  namespace: rinawarp-system
spec:
  podSelector:
    matchLabels:
      app: rinawarp-runtime-controller
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
