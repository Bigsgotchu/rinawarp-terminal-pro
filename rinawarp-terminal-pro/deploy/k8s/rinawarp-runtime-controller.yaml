apiVersion: apps/v1
kind: Deployment
metadata:
  name: rinawarp-runtime-controller
  namespace: rinawarp-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rinawarp-runtime-controller
  template:
    metadata:
      labels:
        app: rinawarp-runtime-controller
    spec:
      serviceAccountName: rinawarp-agentd
      containers:
        - name: controller
          image: 498378078411.dkr.ecr.us-east-1.amazonaws.com/rinawarp-agentd:20260305-032147
          command: ["node", "dist/platform/runtime-controller.js"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: RINAWARP_AGENT_HOME
              value: "/data"
            - name: RINAWARP_RUNTIME_EXECUTION_MODE
              value: "external"
            - name: RINAWARP_RUNTIME_BACKEND
              value: "k8s"
            - name: RINAWARP_RUNTIME_CONTROLLER_POLL_MS
              value: "1500"
            - name: RINAWARP_RUNTIME_CONTROLLER_BATCH
              value: "3"
            - name: RINAWARP_RUNTIME_CONTROLLER_LEADER_ELECTION
              value: "true"
            - name: RINAWARP_RUNTIME_LEASE_NAME
              value: "rinawarp-runtime-controller"
            - name: RINAWARP_RUNTIME_LEASE_DURATION_SEC
              value: "15"
            - name: RINAWARP_RUNTIME_RETRY_PERIOD_MS
              value: "1500"
            - name: RINAWARP_RUNTIME_CONTROLLER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RINAWARP_NATS_MODE
              value: "jetstream"
            - name: RINAWARP_NATS_URL
              value: "nats://nats.rinawarp-system.svc.cluster.local:4222"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 256Mi
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: rinawarp-data
              mountPath: /data
      volumes:
        - name: rinawarp-data
          emptyDir: {}
