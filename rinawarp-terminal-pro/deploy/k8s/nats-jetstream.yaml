apiVersion: v1
kind: Namespace
metadata:
  name: rinawarp-system
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: rinawarp-system
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: cluster
      port: 6222
      targetPort: 6222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: rinawarp-system
spec:
  serviceName: nats
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "-js"
            - "--sd=/data/jetstream"
            - "--cluster_name=rinawarp-js"
            - "--cluster=nats://0.0.0.0:6222"
            - "--routes=nats://nats-0.nats.rinawarp-system.svc.cluster.local:6222,nats://nats-1.nats.rinawarp-system.svc.cluster.local:6222,nats://nats-2.nats.rinawarp-system.svc.cluster.local:6222"
            - "--http_port=8222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 6222
              name: cluster
            - containerPort: 8222
              name: monitor
          volumeMounts:
            - name: jetstream
              mountPath: /data/jetstream
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: jetstream
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
