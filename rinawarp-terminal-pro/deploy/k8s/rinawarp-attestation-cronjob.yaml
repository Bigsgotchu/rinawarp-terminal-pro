apiVersion: batch/v1
kind: CronJob
metadata:
  name: rinawarp-attestation
  namespace: rinawarp-system
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rinawarp-agentd
          restartPolicy: Never
          containers:
            - name: attestation-runner
              image: ghcr.io/rinawarptech/rinawarp-agentd:latest
              command: ["/bin/sh", "-lc"]
              args:
                - >
                  curl -fsS -X POST http://rinawarp-agentd.rinawarp-system.svc.cluster.local:5055/v1/platform/attestation/run
                  -H "Authorization: Bearer ${RINAWARP_ATTESTATION_TOKEN}"
                  -H "Content-Type: application/json"
                  -d '{"force":false}'
              env:
                - name: RINAWARP_ATTESTATION_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: rinawarp-secrets
                      key: attestation_token
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
