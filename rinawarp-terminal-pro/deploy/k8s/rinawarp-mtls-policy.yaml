apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: rinawarp-strict-mtls
  namespace: rinawarp
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: rinawarp-istio-mtls
  namespace: rinawarp
spec:
  host: "*.rinawarp.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
