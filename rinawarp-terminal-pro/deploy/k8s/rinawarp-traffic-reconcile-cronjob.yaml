apiVersion: batch/v1
kind: CronJob
metadata:
  name: rinawarp-traffic-reconcile
  namespace: rinawarp-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rinawarp-agentd
          restartPolicy: Never
          containers:
            - name: traffic-reconcile
              image: curlimages/curl:8.7.1
              command: ["/bin/sh", "-lc"]
              args:
                - >
                  curl -fsS -X POST http://rinawarp-agentd.rinawarp-system.svc.cluster.local:5055/v1/platform/traffic/reconcile
                  -H "Content-Type: application/json"
                  -d '{"force":false}'
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
