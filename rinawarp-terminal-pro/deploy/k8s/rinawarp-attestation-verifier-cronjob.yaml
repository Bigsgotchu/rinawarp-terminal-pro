apiVersion: v1
kind: Namespace
metadata:
  name: rinawarp-verifier
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rinawarp-attestation-verifier
  namespace: rinawarp-verifier
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::498378078411:role/rinawarp-attestation-verifier
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rinawarp-attestation-verifier
  namespace: rinawarp-verifier
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rinawarp-attestation-verifier
          imagePullSecrets:
            - name: ghcr-creds
          automountServiceAccountToken: true
          restartPolicy: Never
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          containers:
            - name: verifier
              image: ghcr.io/bigsgotchu/rinawarp-agentd:latest
              command: ["node", "dist/platform/attestation-verifier.js"]
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: RINAWARP_VERIFIER_INPUT_S3_URI
                  valueFrom:
                    secretKeyRef:
                      name: rinawarp-verifier-secrets
                      key: input_s3_uri
                - name: RINAWARP_VERIFIER_STRICT
                  value: "true"
                - name: RINAWARP_VERIFIER_ALERT_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: rinawarp-verifier-secrets
                      key: alert_webhook
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
