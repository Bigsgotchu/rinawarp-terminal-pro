<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data:;" />
  <title>RinaWarp Terminal Pro</title>
  <link rel="stylesheet" href="./vendor/xterm.css" />

  <link rel="stylesheet" href="./renderer/styles/renderer.css" />
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">
          <div class="name">RinaWarp</div>
          <div class="sub">Sessions and diagnostics</div>
        </div>
      </div>

      <div class="tabbar" role="tablist" aria-label="Sidebar tabs">
        <button class="tab" role="tab" aria-selected="false" data-tab="settings" id="navSettings"
                onclick="setSidebarTab('settings')" aria-label="Settings" title="Settings" data-testid="tab-settings">
          <span class="tab-ico">⚙️</span>
        </button>
      </div>

      <section class="pane">
        <div class="pane-header">
          <div class="title" id="paneTitle">Sessions</div>
          <div class="pane-meta" id="paneMeta">0</div>
        </div>
        <div class="pane-body" id="paneBody" data-testid="panel-sessions"></div>
      </section>
    </aside>

    <!-- Top bar -->
    <header class="topbar">
      <div class="workspace">
        <div class="app-title">RinaWarp Terminal Pro</div>
        <button class="ws-path" id="wsPath" onclick="pickWorkspace()" style="cursor:pointer;display:flex;align-items:center;gap:6px;">
          <span id="wsPathText">(not set)</span>
          <span style="opacity:0.6">⌄</span>
        </button>
      </div>

      <div class="workspace-nav" aria-label="Primary navigation" data-testid="workspace-nav">
        <button class="nav-btn" onclick="openSidebarPanel('sessions')" data-testid="nav-sessions">Sessions</button>
        <button class="nav-btn" onclick="openDiagnosticsFromTop()" data-testid="nav-diagnostics">Diagnostics</button>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="work-col">
        <section id="timeline" class="timeline stream" data-testid="activity-stream-panel" data-testid-block-list="block-list"></section>
        <details id="terminalDrawer" class="terminal-pane terminal-panel--secondary">
          <summary>
            <div class="terminal-pane-head">
              <span>Terminal</span>
              <div class="terminal-pane-actions">
                <span id="selectionSummary" class="selection-pill" style="display:none;"></span>
                <button id="selectionAskBtn" class="chat-btn" style="display:none;" onclick="askRinaAboutSelection()" data-testid="ask-rina-selection">Ask Rina</button>
                <span id="ptyStatus" style="display:none;"></span>
              </div>
            </div>
          </summary>
          <div id="ptyTerminal" data-testid="terminal-root"></div>
        </details>
      </div>
      <aside id="chatPanel" class="chat-panel">
        <div class="chat-panel-head">
          <span>Chat Thread</span>
          <div class="chat-head-actions">
            <button id="chatClearBtn" class="chat-btn" onclick="clearChatThread()">Clear</button>
            <button id="chatToggleBtn" class="chat-btn" onclick="toggleChatPanel()">Close</button>
          </div>
        </div>
        <div id="chatThread" class="chat-thread"></div>
      </aside>
      <aside id="codePanel" class="code-panel" style="display:none;">
        <div class="chat-panel-head">
          <span>Code Workspace</span>
          <div class="chat-head-actions">
            <button class="chat-btn" onclick="refreshCodeWorkspace()">Refresh</button>
          </div>
        </div>
        <div class="code-toolbar">
          <input id="codeSearch" class="code-search" placeholder="Filter files (e.g. main.ts)" oninput="renderCodeFiles()" />
        </div>
        <div class="code-body">
          <div id="codeFiles" class="code-files"></div>
          <pre id="codePreview" class="code-preview">Select a file to preview.</pre>
          <textarea id="codeEditor" class="code-editor" placeholder="Draft edits in this file..."></textarea>
          <div style="min-height:0;display:flex;flex-direction:column;">
            <div class="code-diff-head">
              <button class="chat-btn" onclick="resetCodeDraft()">Reset Draft</button>
              <button class="chat-btn" onclick="previewCodePatch()">Preview Patch</button>
              <button class="chat-btn" onclick="useDraftInPrompt()">Use Draft In Prompt</button>
            </div>
            <pre id="codeDiff" class="code-diff"><span class="meta">Patch preview appears here.</span></pre>
          </div>
        </div>
      </aside>
    </main>

    <!-- Input -->
    <div class="input-area">
      <input id="projectRoot" class="input-project" placeholder="projectRoot (workspace folder)" style="display:none;" />
      <div class="composer">
        <div id="composerStack" class="input-stack">
          <textarea id="composerInput" class="input-intent" rows="1" placeholder="Ask Rina or run a command..." data-testid="terminal-input"></textarea>
        </div>
        <div class="composer-actions">
          <button id="composerSend" class="btn-send" onclick="submitInput()" data-testid="composer-send">Send</button>
        </div>
      </div>
      <div id="usageLine" class="composer-usage"></div>
    </div>
  </div>
  <div class="sidebar-backdrop" onclick="closeSidebarPanel()"></div>

  <!-- Command Palette (hidden by default) -->
  <div id="paletteOverlay" class="palette-overlay" style="display:none" onclick="closePalette(event)">
    <div class="palette" onclick="event.stopPropagation()">
      <div class="palette-input-wrap">
        <span style="color:var(--rw-muted)">›</span>
        <input id="paletteInput" class="palette-input" placeholder="Type a command or search…" autocomplete="off" />
        <span class="palette-shortcut">ESC</span>
      </div>
      <div class="palette-body">
        <div id="paletteResults" class="palette-results"></div>
        <div id="palettePreview" class="palette-preview">
          <div class="palette-preview-title">Quick Preview</div>
          <div class="palette-preview-meta">Use ↑/↓ to browse results</div>
          <div class="palette-preview-snippet">Select a command or search hit to preview details here.</div>
        </div>
      </div>
    </div>
  </div>

    async function resolveIntentDecision(blockId, modeChoice) {
      const block = findBlockById(blockId);
      const pendingInput = String(block?.pendingInput || "").trim();
      if (!pendingInput) return;
      if (modeChoice === "terminal") {
        const sent = await writeTerminalCommandToPty(
          pendingInput,
          (document.getElementById("projectRoot")?.value || "").trim() || undefined,
        );
        if (!sent) return;
        updateBlock(blockId, {
          status: "ok",
          markdown: `Ran in terminal: \`${pendingInput}\``,
          inputDecision: "terminal",
          pendingInput: undefined,
        });
        return;
      }
      try {
        await runInlineRinaPrompt(pendingInput, {
          blockId,
          triggerType: "input",
          sourceText: pendingInput,
          loadingMessage: "Letting Rina interpret that request...",
          successLabel: `Rina interpreted: ${pendingInput}`,
        });
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "Inline Rina failed");
        updateBlock(blockId, {
          status: "failed",
          markdown: `Inline Rina failed.\n\n${msg}`,
        });
      }
    }

    async function ensurePty() {
      if (ptyConnected) return true;
      if (ptyStartPromise) return await ptyStartPromise;
      ptyStartPromise = startPtySession();
      try {
        return await ptyStartPromise;
      } finally {
        ptyStartPromise = null;
      }
    }

    async function startPtySession() {
      const projectRoot = (document.getElementById("projectRoot").value || "").trim();

      if (!ptyTerm && window.Terminal) {
        const termEl = document.getElementById("ptyTerminal");
        const active = findThemeById(activeThemeId);
        const mappedTheme = toXtermTheme(active?.terminal);
        ptyTerm = new window.Terminal({
          cursorBlink: true,
          fontSize: 13,
          scrollback: 5000,
          theme: mappedTheme || { background: "#0b0f17", foreground: "#e6e6e6" }
        });
        window.__term = ptyTerm;
        ptyFit = window.FitAddon ? new window.FitAddon.FitAddon() : null;
        if (ptyFit) ptyTerm.loadAddon(ptyFit);
        ptyTerm.open(termEl);
        ptyTerm.onSelectionChange?.(() => refreshCurrentSelection());
        if (ptyFit) ptyFit.fit();
        ptyTerm.focus();
        ptyTerm.attachCustomKeyEventHandler((ev) => {
          const key = String(ev?.key || "").toLowerCase();
          const accel = !!(ev?.ctrlKey || ev?.metaKey);
          const shift = !!ev?.shiftKey;
          if (accel && shift && key === "c") {
            const selected = ptyTerm?.getSelection?.() || "";
            if (selected) {
              navigator.clipboard?.writeText(selected).catch(() => {});
              toast("Copied selection");
            }
            return false;
          }
          if (accel && shift && key === "v") {
            navigator.clipboard?.readText?.().then((txt) => {
              if (txt) window.rina.ptyWrite?.(txt);
            }).catch(() => {});
            return false;
          }
          return true;
        });
        ptyTerm.onData((data) => {
          window.rina.ptyWrite?.(data);
        });
      } else if (!window.Terminal) {

    async function preflightPolicy(command, opts = {}) {
      const riskHint = opts.risk || "safe-write";
      try {
        const ex = await window.rina?.policyExplain?.(command);
        if (!ex) return { ok: true, confirmed: true, confirmationText: "", explanation: null };
        if (ex.action === "deny") {
          toast(`Policy deny: ${ex.message}`);
          return { ok: false, confirmed: false, confirmationText: "", explanation: ex };
        }
        if (ex.action === "allow") {
          return { ok: true, confirmed: true, confirmationText: "", explanation: ex };
        }
        const approval = ex.approval || (riskHint === "high-impact" ? "typed_yes" : "click");
        if (approval === "click") {
          const proceed = confirm(ex.message || "Proceed with this command?");
          return { ok: proceed, confirmed: proceed, confirmationText: "", explanation: ex };
        }
        if (approval === "typed_phrase") {
          const phrase = String(ex.typedPhrase || "YES");
          const typed = prompt(`${ex.message || "Confirmation required"}\nType exactly: ${phrase}`) ?? "";
          const pass = typed === phrase;
          if (!pass) toast("Policy confirmation phrase mismatch");
          return { ok: pass, confirmed: pass, confirmationText: typed, explanation: ex };
        }
        const typed = prompt(`${ex.message || "Confirmation required"}\nType YES to continue`) ?? "";
        const pass = typed === "YES";
        if (!pass) toast("Policy confirmation failed");
        return { ok: pass, confirmed: pass, confirmationText: typed, explanation: ex };
      } catch {
        return { ok: true, confirmed: true, confirmationText: "", explanation: null };
      }
    }

    async function preflightPlanPolicy(plan) {
      const steps = Array.isArray(plan?.steps) ? plan.steps : [];
      const checks = [];
      for (const s of steps) {
        const cmd = s?.input?.command;
        if (!cmd) continue;
        const ex = await window.rina?.policyExplain?.(cmd);
        if (!ex) continue;
        if (ex.action === "deny") {
          toast(`Policy deny: ${ex.message}`);
          return { ok: false, confirmed: false, confirmationText: "" };
        }
        checks.push(ex);
      }
      const phraseSet = new Set(checks.filter((c) => c.approval === "typed_phrase").map((c) => c.typedPhrase || "YES"));
      if (phraseSet.size > 1) {
        toast("Plan uses conflicting policy phrases. Split into smaller plans.");
        return { ok: false, confirmed: false, confirmationText: "" };
      }
      if (phraseSet.size === 1) {
        const phrase = Array.from(phraseSet)[0];
        const typed = prompt(`Policy confirmation required for this plan.\nType exactly: ${phrase}`) ?? "";
        const pass = typed === phrase;
        if (!pass) toast("Policy confirmation phrase mismatch");
        return { ok: pass, confirmed: pass, confirmationText: typed };
      }
      if (checks.some((c) => c.approval === "typed_yes")) {
        const typed = prompt("Policy confirmation required for this plan.\nType YES to continue") ?? "";
        const pass = typed === "YES";
        if (!pass) toast("Policy confirmation failed");
        return { ok: pass, confirmed: pass, confirmationText: typed };
      }
      if (checks.some((c) => c.action === "require_approval" || c.action === "require_two_step")) {
        const proceed = confirm("Policy approval required for this plan. Continue?");
        return { ok: proceed, confirmed: proceed, confirmationText: "" };
      }
      return { ok: true, confirmed: true, confirmationText: "" };
    }

    async function runTerminalCommand(command, projectRoot, opts = {}) {
      try {
      // Create a step block immediately (single-step execution)
      const stepBlockId = newId("step");
      addBlock({
        id: stepBlockId,
        type: "step",
        status: "queued",
        createdAt: Date.now(),
        title: "terminal",
        command,
        activationTag: opts.activationTag || null,
        risk: "safe-write",
        stdout: "",
        stderr: ""
      });

      const looksHighImpact = /\b(rm\s+-rf|mkfs|shutdown|reboot|dd\s+if=|docker\s+system\s+prune)\b/i.test(command);
      const policy = await preflightPolicy(command, { risk: looksHighImpact ? "high-impact" : "safe-write" });
      if (!policy.ok) {
        updateBlock(stepBlockId, { status: "cancelled", stderr: "Cancelled by policy.\n" });
        return null;
      }

      // Execute via engine-backed step stream
      const step = {
        id: `terminal_${stepBlockId}`,
        tool: "terminal",
        command,
        risk: looksHighImpact ? "high-impact" : "safe-write"
      };

      const { streamId } = await window.rina.executeStepStream({
        step,
        projectRoot,
        confirmed: policy.confirmed,
        confirmationText: policy.confirmationText
      });

      updateBlock(stepBlockId, { status: "running", streamId, stdout: "", stderr: "" });
      mapStreamToBlock(streamId, stepBlockId);
      renderBlocks();
      return stepBlockId;
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "terminal command failed");
        reportRuntimeError("Terminal Error", msg);
        return null;
      }
    }

    async function maybeAutoRepairPlan(blockId, haltedBecause) {
      if (!blockId) return false;
      const state = getAutoRepairState(blockId);
      if (!state || Number(state.retriesLeft || 0) <= 0) return false;
      const block = getBlockById(blockId);
      if (!block?.plan) return false;
      consumeAutoRepairRetry(blockId);

      const projectRoot = (document.getElementById("projectRoot").value || "").trim();
      const failedSteps = blocks
        .filter((b) => b.type === "step" && b.planBlockId === blockId && (b.status === "failed" || b.status === "cancelled"))
        .slice(-4)
        .map((b) => `${b.stepId || b.id}: ${(b.stderr || b.stdout || "").slice(0, 240)}`)
        .join("\n");
      const repairIntent = `${block.plan.intent || "Fix the task"}\n\nPrevious plan halted because: ${haltedBecause || "unknown"}\n\nRecent failing output:\n${failedSteps || "(none)"}\n\nGenerate a revised plan with safer, verifiable steps.`;
      try {
        const repairedPlan = await window.rina.agentPlan({ intentText: repairIntent, projectRoot });
        updateBlock(blockId, {
          status: "queued",
          markdown: `${repairedPlan.reasoning || ""}\n\nAuto-repair attempt applied.\n\nSteps:\n${(repairedPlan.steps || []).map((s) =>
            `- ${s.stepId ?? ""} \`${(s.input?.command ?? "").replaceAll("`", "")}\``
          ).join("\n")}`,
          plan: repairedPlan,
        });
        toast("Auto-repair generated a revised plan");
        await runPlan(blockId);
        return true;
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "auto-repair failed");
        updateBlock(blockId, {
          status: "failed",
          stderr: `${block.stderr || ""}\nAuto-repair failed: ${msg}\n`,
        });
        return false;
      }
    }

    async function runPlanWithAutoRepair(blockId) {

    async function runPlan(blockId, activationTag = null) {
      try {
      const block = blocks.find(b => b.id === blockId);
      if (!block?.plan) return;
      if (activationTag) block.activationTag = activationTag;

      const projectRoot = (document.getElementById("projectRoot").value || "").trim();
      const policy = await preflightPlanPolicy(block.plan);
      if (!policy.ok) return;

      updateBlock(blockId, { status: "running" });

      try {
        const { planRunId } = await window.rina.executePlanStream({
          plan: block.plan.steps,
          projectRoot,
          confirmed: policy.confirmed,
          confirmationText: policy.confirmationText
        });
        mapPlanRun(planRunId, blockId, {
          startedAt: Date.now(),
          intent: block.plan.intent || "",
          stepCount: Array.isArray(block.plan.steps) ? block.plan.steps.length : 0,
        });
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "Plan execution failed");
        updateBlock(blockId, {
          status: "failed",
          stderr: (block.stderr || "") + `${msg}\n`,
          markdown: `${block.markdown || ""}\n\nExecution error: ${msg}`,
        });
        recordAgentEval({
          ok: false,
          haltedBecause: msg,
          durationMs: 0,
          stepCount: Array.isArray(block.plan?.steps) ? block.plan.steps.length : 0,
          intent: block.plan?.intent || "",
        });
        toast(`Run plan failed: ${msg}`);
      }
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "run plan failed");
        reportRuntimeError("Plan Error", msg);
      }
    }

    async function stopPlan(blockId, force = false) {
      try {
        const block = blocks.find(b => b.id === blockId);
        if (!block?.plan) return;
        const planRunId = getActivePlanRunIdForBlock(blockId) || block.plan.id;
        await window.rina?.stopPlan?.(planRunId);

        const runningStreams = blocks
          .filter((b) => b.type === "step" && b.status === "running" && b.streamId && b.planBlockId === blockId)
          .map((b) => b.streamId);

        for (const sid of runningStreams) {
          clearRunningStreamLocally(sid, { note: "Stop requested." });
        }

        let doForce = !!force;
        if (!doForce) {
          const wantsForce = confirm("Plan stop requested.\nUse force stop to kill currently running step streams?");
          doForce = !!wantsForce;
        }

        if (doForce) {
          if (runningStreams.length) {
            await Promise.all(runningStreams.map((sid) => window.rina?.killStream?.(sid)));
            toast(`Force-stopped ${runningStreams.length} stream(s).`);
          } else {
            toast("No active step streams to force stop.");
          }
        } else {
          toast("Stopping plan...");
        }
        updateBlock(blockId, { status: "cancelled" });
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "stop failed");
        reportRuntimeError("Stop Error", msg);
      }
    }

    async function runStep(blockId) {
      try {
        const block = blocks.find(b => b.id === blockId);

      const projectRoot = (document.getElementById("projectRoot").value || "").trim();
      const step = {
        id: block.stepId ?? `step_${blockId}`,
        tool: "terminal",
        command: block.command,
        risk: block.risk ?? "safe-write"

      const policy = await preflightPolicy(block.command, { risk: step.risk });

          step,
          projectRoot,
          confirmed: policy.confirmed,
          confirmationText: policy.confirmationText

        updateBlock(blockId, { status: "running", streamId, stdout: "", stderr: "" });
        mapStreamToBlock(streamId, blockId);
        renderBlocks();
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err || "step failed");
        reportRuntimeError("Step Error", msg);
      }
    }

    document.getElementById("ptyTerminal")?.addEventListener("paste", async (e) => {
      if (mode !== "terminal") return;
      const text = e?.clipboardData?.getData("text/plain");
      if (!text) return;
      e.preventDefault();
      await window.rina?.ptyWrite?.(text);
    });

    window.rina.onPtyData?.((data) => {
      window.__ptyTranscript = `${window.__ptyTranscript || ""}${String(data || "")}`.slice(-200000);
      appendTerminalNarrationChunk(data);
      queueTerminalOutput(data);
      if (ptyTerm) {
        ptyTerm.write(data);
      } else {
        ptyFallbackBuffer += data;
        const pre = document.querySelector("#ptyTerminal .terminal-fallback");
        if (pre) pre.textContent = ptyFallbackBuffer.slice(-200_000);
      }
    });

    window.rina.onPtyExit?.((payload) => {
      flushPendingTerminalChunk();
      markPtyOffline();
      addBlock({
        id: newId("terminal"),
        type: "terminal_output",
        status: payload?.exitCode === 0 ? "ok" : "failed",
        createdAt: Date.now(),
        title: "Terminal",
        command: lastTerminalCommand || undefined,
        markdown: payload?.exitCode === 0 ? "Completed successfully." : "Command finished with errors.",
        exitCode: payload?.exitCode ?? null,
      });
      toast("Terminal offline");
    });

    window.addEventListener("resize", () => {
      if (!ptyConnected) return;
      if (window.__ptyResizeTimer) clearTimeout(window.__ptyResizeTimer);
      window.__ptyResizeTimer = setTimeout(() => {
        if (ptyFit) ptyFit.fit();
        if (ptyTerm) window.rina.ptyResize?.(ptyTerm.cols, ptyTerm.rows);
      }, 80);
    });

    window.rina.onCustomEvent?.("rina:pty:boundaryStats", (payload) => {
      ptyBoundaryCaptured = Number(payload?.captured || 0);
      if (activeSidebarTab === "structured") setSidebarTab("structured");
    });

    window.rina.onCustomEvent?.("rina:pty:boundary", (payload) => {
      completeTerminalNarration(payload);
      if (!payload?.failed) return;
      const command = String(payload?.command || "").trim();
      if (!command) return;
      const signature = `${command}::${String(payload?.failureSummary || "")}`;
      if (signature === lastFailureSignature) return;
      lastFailureSignature = signature;
      addBlock({
        id: newId("assistant"),
        type: "assistant",
        status: "queued",
        createdAt: Date.now(),
        title: "Rina",
        markdown: `That command failed: \`${command}\`${payload?.failureSummary ? `\n\n${payload.failureSummary}` : ""}`,
        failureContext: {
          command,
          output: String(payload?.output || ""),
          cwd: String(payload?.cwd || ""),
        },
      });
      toast("Rina noticed a failed command");
    });

    // Palette input listener
    document.getElementById("paletteInput")?.addEventListener("input", refreshPaletteResults);
    document.getElementById("codeEditor")?.addEventListener("input", (e) => {
      if (!codeSelectedPath) return;
      const target = e.target;
      if (!target || typeof target.value !== "string") return;
      codeFileDrafts[codeSelectedPath] = target.value;
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const active = document.activeElement;
      if (active && active.id === "structuredSearchInput") {
        e.preventDefault();
        runStructuredSearchFromInput().catch(() => {});
      }
    });
    getComposerInput()?.addEventListener("input", autosizeIntentInput);

    // Global renderer error capture so failures are visible in-app.
    window.addEventListener("error", (event) => {
      const msg = event?.message || "Unknown error";
      const src = event?.filename ? `${event.filename}:${event.lineno || 0}` : "";
      window.rina?.reportRendererError?.({ kind: "error", message: msg, extra: src });
      reportRuntimeError("JavaScript Error", msg, src);
    });
    window.addEventListener("unhandledrejection", (event) => {
      const reason = event?.reason;
      const msg = (reason && reason.message) ? reason.message : String(reason || "Unhandled promise rejection");
      window.rina?.reportRendererError?.({ kind: "unhandledrejection", message: msg });
      reportRuntimeError("Unhandled Rejection", msg);
    });

    // Enter submits input area
    getComposerInput()?.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submitInput().catch((err) => {
          const msg = (err && err.message) ? err.message : String(err || "submit failed");
          reportRuntimeError("Submit Error", msg);
        });
      }
    });

    // Palette keyboard nav
    document.getElementById("paletteOverlay")?.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        setPaletteSelectedIndex(paletteSelectedIndex + 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        setPaletteSelectedIndex(paletteSelectedIndex - 1);
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (paletteSelectedIndex >= 0) {
          executePaletteItem(paletteSelectedIndex);
        }
      }
    });

    // Load workspace history on start
    loadWorkspaceHistory();
    ensureWorkspaceRoot().catch(() => {});
    loadSavedSearches();
    loadDiagnosticsAutoRefresh();
    loadDiagnosticsPollInterval();
    restoreUiSnapshot();
    loadThemeState()
      .then(() => {
        const initial = findThemeById(activeThemeId) || (themeRegistry?.themes || [])[0];
        if (initial) {
          activeThemeId = initial.id;
          applyThemeSpec(initial);
        }
      })
      .catch((err) => console.warn("theme init failed", err));
    refreshStructuredStatus();
    refreshPolicyStatus();
    runOnboarding(false);
    renderActivationChecklist();
    autosizeIntentInput();
    applySidePanelsVisibility();
    // Initial sidebar tab
    setSidebarTab("sessions");
    startDiagnosticsPolling();
    startWorkflowPolling();
    window.RinaRendererUsageController.refreshUsageLine().catch(() => {});

    window.addEventListener("beforeunload", () => {
      if (diagnosticsPollTimer) clearInterval(diagnosticsPollTimer);
      if (workflowPollTimer) clearInterval(workflowPollTimer);
      persistUiSnapshot();
    });
  </script>

  <!-- Settings host (Warp-style vertical tabs) -->
  <div id="rw-settings"></div>

  <!-- Command Palette host (modular) -->
  <div id="rw-palette-backdrop" class="rw-palette-backdrop" style="display:none" aria-hidden="true">
    <div id="rw-palette" class="rw-palette" role="dialog" aria-modal="true" aria-label="Command Palette"></div>
  </div>

  <script type="module">
    import { classifyTerminalInput } from "./terminal-input-classifier.js";
    window.RinaWarpInputClassifier = { classifyTerminalInput };
  </script>

  <script type="module">
    import { initSettingsUi } from "./renderer/settings/bootstrap.js";
    import { bootstrapPalette } from "./renderer/palette/bootstrap.js";
    const initUiShell = () => {
      try { initSettingsUi(); } catch (e) { console.warn("settings init failed", e); }
      try { bootstrapPalette(); } catch (e) { console.warn("palette init failed", e); }
    };
    if (document.readyState === "loading") {
      window.addEventListener("DOMContentLoaded", initUiShell, { once: true });
    } else {
      initUiShell();
    }
  </script>
</body>
</html>
